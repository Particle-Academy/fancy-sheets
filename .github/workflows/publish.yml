name: Publish to npm

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      # The package uses `workspace:*` for @particle-academy/react-fancy in
      # devDependencies (resolved via pnpm in the monorepo). Standalone CI
      # has no workspace, so rewrite the protocol to a plain version range.
      - name: Rewrite workspace protocol
        run: |
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            for (const section of ['dependencies', 'devDependencies', 'peerDependencies']) {
              if (!pkg[section]) continue;
              for (const [name, version] of Object.entries(pkg[section])) {
                if (typeof version === 'string' && version.startsWith('workspace:')) {
                  pkg[section][name] = version.slice('workspace:'.length);
                }
              }
            }
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

      - name: Install
        run: npm install --no-audit --no-fund

      - name: Build
        run: npm run build

      # Trusted Publishing (OIDC) requires npm 11.5.1+; bundled npm in
      # the runner is 10.x. Use npx to fetch a fresh npm just for publish.
      - name: Publish
        run: npx -y npm@latest publish --provenance --access public
